# Portainer Stack — Quantis (kéo từ Git, dùng image Docker Hub)
# Backend Node (API) lộ ra cổng 4001, Backend Python (phân tích) lộ ra cổng 4000 trên host.
#
# Cách triển khai trong Portainer:
#   1. Stacks → Add stack → chọn "Git repository"
#   2. Repository URL:    https://github.com/Lampx83/Quantis
#   3. Compose path:      portainer-stack.yml
#   4. Branch:            main
#   5. (Tùy chọn) Environment variables:
#      DOCKERHUB_USER         = username Docker Hub (mặc định: Lampx83)
#      OLLAMA_URL = URL Ollama (mặc định: https://research.neu.edu.vn/ollama)
#

services:
  quantis-backend:
    image: ${DOCKERHUB_USER:-Lampx83}/quantis-backend:latest
    container_name: quantis-backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      ARCHIVE_NEU_URL: "https://archive.neu.edu.vn"
      OLLAMA_URL: ${OLLAMA_URL:-https://research.neu.edu.vn/ollama}
      ANALYZE_PYTHON_URL: "http://quantis-python:8000"
    volumes:
      - quantis-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  quantis-python:
    image: ${DOCKERHUB_USER:-Lampx83}/quantis-python:latest
    container_name: quantis-python
    restart: unless-stopped
    ports:
      - "4000:8000"
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  quantis-data:
